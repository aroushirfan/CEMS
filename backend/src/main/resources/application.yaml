spring:
  application:
    name: cems_backend

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/cems_db
    username: root
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  jackson:
    property-naming-strategy: SNAKE_CASE

  mail:
    host: smtp.gmail.com
    port: 587
    username: admin@gmail.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: "b4f8c2e1d9a7f6c3b2e1d9f8c4a6b8d7e9f1c3a5b7d9e2f4a6c8e0f2b4d6a8c0"

server:
  port: 8081